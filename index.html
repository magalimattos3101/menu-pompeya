<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Menú digital y pedidos online de Pompeya Pub Social">
    <title>Menú - Pompeya Pub Social</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <section id="vista-portada">
        <div class="portada-container">
            <img src="img/portada-final.jpg" alt="Fondo Pompeya Pub" class="fondo-img">
            <div class="boton-wrapper">
                <button class="btn-rojo-portada" onclick="abrirCategorias()">HACÉ TU PEDIDO</button>
            </div>
        </div>
    </section>


    <section id="vista-categorias" style="display: none;">
        <header class="navbar">
            <div class="nav-logo" onclick="volverPortada()">
                <img src="img/logo-blanco.png" alt="Ir a inicio - Pompeya" class="logo-img">
            </div>
        </header>

        <main class="container">
            <h2 class="titulo-pedido">Qué vas a pedir?</h2>
            
            <div class="grilla-fotos-categorias">
                <article class="card-categoria" onclick="verProductos('seccion-tapeos')">
                    <img src="img/cat-tapeos.webp" alt="Categoría Tapeos">
                </article>
                <article class="card-categoria" onclick="verProductos('seccion-burgers')">
                    <img src="img/cat-burgers.webp" alt="Categoría Burgers">   
                </article>
                <article class="card-categoria" onclick="verProductos('seccion-veggie')">
                    <img src="img/cat-veggie-burgers.webp" alt="Categoría Veggie burgers">
                </article>
                <article class="card-categoria" onclick="verProductos('seccion-sandwiches')">
                    <img src="img/cat-sandwiches-y-wraps.webp" alt="Categoría Sandwiches y wraps">
                </article>
                <article class="card-categoria" onclick="verProductos('seccion-ensaladas')">
                    <img src="img/cat-ensaladas.webp" alt="Categoría Ensaladas">
                </article>
                <article class="card-categoria" onclick="verProductos('seccion-pizzas')">
                    <img src="img/cat-pizzas.webp" alt="Categoría Pizzas">
                </article>
                <article class="card-categoria" onclick="verProductos('seccion-postres')">
                    <img src="img/cat-postres.webp" alt="Categoría Postres">
                </article>
                <article class="card-categoria" onclick="verProductos('seccion-bebidas')">
                    <img src="img/cat-bebidas.webp" alt="Categoría Bebidas">
                </article>
            </div>

            <div style="height: 100px;" aria-hidden="true"></div> 
        </main>
            <a href="https://wa.me/5491139520659" class="boton-flotante-wsp" target="_blank">
        <img src="img/icono-whatsapp.png" alt="WhatsApp">
        </a>
    </section>


    <section id="vista-productos" style="display: none;">
        <header class="navbar">
    <div class="nav-links">
        <button class="btn-back" onclick="volverCategorias()" aria-label="Volver atrás">
            <img src="img/flecha-volver.png" alt="" class="icono-flecha">
        </button>
    
    </div>
    
    <div class="nav-logo" onclick="volverPortada()">
        <img src="img/logo-blanco.png" alt="Logo Pompeya Pub Social" class="logo-img">
    </div>
    </header>
    
        <main class="container">
    <section id="seccion-tapeos" class="grupo-productos">
        <h2 class="titulo-seccion">tapeos</h2>
        <div id="contenedor-tapeos"></div> </section>

    <section id="seccion-burgers" class="grupo-productos">
        <h2 class="titulo-seccion">burgers</h2>
        <div id="contenedor-burgers"></div>
    </section>
    
    <section id="seccion-veggie" class="grupo-productos">
        <h2 class="titulo-seccion">veggie burgers</h2>
        <div id="contenedor-veggie"></div>
    </section>

    <section id="seccion-pizzas" class="grupo-productos">
        <h2 class="titulo-seccion">pizzas</h2>
        <div id="contenedor-pizzas"></div>
    </section>

    <section id="seccion-ensaladas" class="grupo-productos">
        <h2 class="titulo-seccion">ensaladas</h2>
        <div id="contenedor-ensaladas"></div>
    </section>    

        <section id="seccion-sandwiches" class="grupo-productos">
        <h2 class="titulo-seccion">sandwiches y wraps</h2>
        <div id="contenedor-sandwiches"></div>
    </section>

        <section id="seccion-postres" class="grupo-productos">
        <h2 class="titulo-seccion">postres</h2>
        <div id="contenedor-postres"></div>
    </section>

        <section id="seccion-bebidas" class="grupo-productos">
        <h2 class="titulo-seccion">bebidas</h2>
        <div id="contenedor-bebidas"></div>
    </section>

    <div style="height: 120px;" aria-hidden="true"></div> 
</main>


    <button id="btn-pedido" onclick="abrirCarrito()" aria-label="Abrir carrito de compras">
        VER PEDIDO (<span id="cantidad-carrito">0</span>) - $<span id="total-carrito">0</span>
    </button>

    <dialog id="modal-aclaraciones" class="modal-oculto">
        <div class="modal-contenido">
            <h3>¿Alguna aclaración?</h3>
            <p id="modal-producto-nombre">Nombre del producto</p>
            <textarea id="modal-input-aclaracion" placeholder="Ej: Sin cebolla, extra aderezo..."></textarea>
            <div class="modal-botones">
                <button type="button" class="btn-cancelar" onclick="cerrarModal()">CANCELAR</button>
                <button type="button" class="btn-confirmar" onclick="confirmarAgregar()">AÑADIR AL CARRITO</button>
            </div>
        </div>
    </dialog>

    <dialog id="modal-datos-envio" class="modal-oculto">
        <div class="modal-contenido">
            <h3>COMPLETÁ LOS DATOS</h3>
            <form id="form-datos-envio" onsubmit="enviarPedidoFinal(event); return false;">
                <input type="text" id="dato-nombre" placeholder="Nombre completo" required>
                <input type="text" id="dato-direccion" placeholder="Dirección" required>
                <input type="text" id="dato-entre-calles" placeholder="Entre calles" required>
                <input type="text" id="dato-piso" placeholder="Piso y Dpto (Opcional)">
                <input type="text" id="dato-localidad" placeholder="Localidad" required>
                
                <select id="dato-pago" required>
                    <option value="" disabled selected>Método de pago</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Transferencia">Transferencia</option>
                    <option value="Mercado Pago">Mercado Pago</option>
                </select>

                <div class="gracias-seccion">
                    <p>¡Gracias!</p>
                    <p class="total-final">Total: $<span id="total-modal-final">0</span></p>
                </div>

                <div class="modal-botones">
                    <button type="button" class="btn-cancelar" onclick="cerrarModalDatos()">CANCELAR</button>
                    <button type="submit" class="btn-confirmar">ENVIAR PEDIDO</button>
                </div>
            </form>
        </div>
    </dialog>

    <aside id="carrito-lateral" class="carrito-offcanvas">
        <div class="carrito-header">
            <h3>Mi pedido</h3>
            <button class="btn-cerrar" onclick="cerrarCarrito()" aria-label="Cerrar carrito">×</button>
        </div>
        
        <div id="lista-carrito" class="carrito-cuerpo"></div>

        <div class="carrito-footer">
            <div class="total-contenedor">
                <span>TOTAL:</span>
                <span id="total-carrito-lateral">$0</span>
            </div>
            <button type="button" class="btn-enviar-wa" onclick="enviarPedido()">PEDIR POR WHATSAPP</button>
        </div>
    </aside>

    <div id="overlay" onclick="cerrarTodo()" aria-hidden="true"></div>
    
    <script src="js/script.js"></script>

</body>

</html>
